name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install npmctl from PyPI
        run: python -m pip install --upgrade npmctl npmctl-namecheap
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Validate npmctl desired state
        run: npmctl validate desired-state
      - run: npm run docker:build
