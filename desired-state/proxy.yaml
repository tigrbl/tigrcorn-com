---
apiVersion: npmctl.com/v1
schemaVersion: 2
proxy_hosts:
  - domain_names:
      - tigrcorn.com
      - www.tigrcorn.com
    forward_scheme: http
    forward_host: tigrcorn-com
    forward_port: 80
    ssl_forced: 1
    http2_support: 1
    allow_websocket_upgrade: 1
    block_exploits: 1
    meta:
      managed_by: npmctl
      owner: tigrcorn-com
      resource_id: proxy.tigrcorn-com
