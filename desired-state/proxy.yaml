---
apiVersion: npmctl.com/v1
schemaVersion: 2
certificates:
  - name: tigrcorn-com-letsencrypt
    domain_names:
      - tigrcorn.com
      - www.tigrcorn.com
    certificate_type: letsencrypt
    api_payload:
      provider: letsencrypt
      meta:
        letsencrypt_email: "__NPM_IDENTITY__"
        letsencrypt_agree: true
        dns_challenge: false
    meta:
      managed_by: npmctl
      owner: tigrcorn-com
      resource_id: cert.tigrcorn-com
proxy_hosts:
  - domain_names:
      - tigrcorn.com
      - www.tigrcorn.com
    forward_scheme: http
    forward_host: tigrcorn-com
    forward_port: 80
    certificate_ref: cert.tigrcorn-com
    ssl_forced: 1
    http2_support: 1
    hsts_enabled: 1
    hsts_subdomains: 0
    allow_websocket_upgrade: 1
    block_exploits: 1
    meta:
      managed_by: npmctl
      owner: tigrcorn-com
      resource_id: proxy.tigrcorn-com
