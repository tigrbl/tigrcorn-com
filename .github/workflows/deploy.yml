name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-tigrcorn-com
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run deploy:dry-run
      - run: docker compose -f docker-compose.yaml up -d --build --force-recreate --no-deps tigrcorn-com
